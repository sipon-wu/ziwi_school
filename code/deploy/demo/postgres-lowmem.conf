# PostgreSQL 低内存优化配置（适用于 <= 4GB RAM 服务器）
# 挂载到容器: /etc/postgresql/postgresql.conf
# 启动参数: -c config_file=/etc/postgresql/postgresql.conf

# ── 内存 ──
shared_buffers = 256MB              # 默认 RAM 25% 太大，这里限制为 256MB
effective_cache_size = 1GB          # 告诉 PG 有 1GB OS缓存可用
work_mem = 8MB                      # 单操作排序/哈希内存（低并发安全）
maintenance_work_mem = 64MB         # VACUUM/CREATE INDEX 内存
wal_buffers = 8MB                   # WAL 缓冲区

# ── 连接 ──
max_connections = 20                # 演示环境 20 连接足够
superuser_reserved_connections = 3

# ── 查询规划器 ──
random_page_cost = 1.1              # SSD 存储，降低随机读代价
effective_io_concurrency = 200      # SSD 并发 IO
seq_page_cost = 1.0

# ── WAL ──
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# ── 自动清理 ──
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 60s

# ── 日志 ──
log_destination = 'stderr'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%a.log'
log_rotation_age = 1d
log_rotation_size = 10MB
log_truncate_on_rotation = on
log_min_duration_statement = 1000   # 记录超过 1 秒的查询
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ── pgvector 相关 ──
# ivfflat probes 在查询时通过 SET 语句控制，此处用默认值
# HNSW 索引在构建时通过 maintenance_work_mem 优化
