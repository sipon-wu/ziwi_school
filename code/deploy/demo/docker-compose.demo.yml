version: '3.8'

# 知微AI教学助手 — 演示环境 Docker Compose
# 适配: 4核 / 4GB / 40GB SSD (腾讯轻量云)
# 部署: docker compose -f deploy/demo/docker-compose.demo.yml --env-file deploy/demo/.env.demo up -d

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: zhiwei-demo-nginx
    ports:
      - "${DEMO_PORT:-80}:80"
    volumes:
      - ./nginx.demo.conf:/etc/nginx/nginx.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - business-api
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - demo-net

  business-api:
    image: zhiwei/api:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: zhiwei-demo-api
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-zhiwei}
      - DB_PASSWORD=${DB_PASSWORD:-zhiwei2026}
      - DB_NAME=${DB_NAME:-zhiwei}
      - REDIS_URL=${REDIS_URL:-redis:6379}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8000}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-dev-key}
      - DEMO_MODE=${DEMO_MODE:-true}
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - demo-net

  ai-service:
    image: zhiwei/ai:latest
    build:
      context: ../../ai-service
      dockerfile: Dockerfile
    container_name: zhiwei-demo-ai
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-zhiwei}
      - DB_PASSWORD=${DB_PASSWORD:-zhiwei2026}
      - DB_NAME=${DB_NAME:-zhiwei}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-}
      - DATABASE_URL=postgresql://${DB_USER:-zhiwei}:${DB_PASSWORD:-zhiwei2026}@postgres:5432/${DB_NAME:-zhiwei}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - demo-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhiwei-demo-db
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=20
      - -c
      - listen_addresses=*
    environment:
      - POSTGRES_USER=${DB_USER:-zhiwei}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-zhiwei2026}
      - POSTGRES_DB=${DB_NAME:-zhiwei}
    volumes:
      - demo_pg_data:/var/lib/postgresql/data
      - ./postgres-lowmem.conf:/etc/postgresql/postgresql.conf:ro
      - ../../curriculum-data/init_demo.sql:/docker-entrypoint-initdb.d/init_demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zhiwei}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    shm_size: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - demo-net

  redis:
    image: redis:7-alpine
    container_name: zhiwei-demo-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 96m
    mem_reservation: 48m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - demo-net

  # 每日数据重置（cron 容器）
  reset-cron:
    image: alpine:3.19
    container_name: zhiwei-demo-reset
    volumes:
      - ../../scripts/reset-demo.sh:/reset.sh:ro
    entrypoint: |
      sh -c 'echo "0 2 * * * /reset.sh >> /var/log/reset.log 2>&1" | crontab - && crond -f'
    mem_limit: 32m
    mem_reservation: 16m
    networks:
      - demo-net
    depends_on:
      - postgres
      - redis

volumes:
  demo_pg_data:

networks:
  demo-net:
    driver: bridge
