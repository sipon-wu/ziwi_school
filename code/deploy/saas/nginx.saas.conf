worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    # 限流
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name school.ziwi.cn;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name school.ziwi.cn;

        ssl_certificate     /etc/letsencrypt/live/school.ziwi.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/school.ziwi.cn/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── 安全响应头 ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' ws: wss:" always;

        # WAF
        if ($request_uri ~* "(select|union|insert|drop|update|delete).*(%20|%27|')") { return 403; }
        if ($request_uri ~* "<script.*>|javascript:|onload=|onerror=") { return 403; }
        if ($request_uri ~* "(\.\./|\.\.%2f|\.\.%5c)") { return 403; }
        location ~* /\.(git|env|htaccess|DS_Store) { return 404; }

        # 前端
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://business-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # AI 服务
        location /ai/ {
            proxy_pass http://ai-service:8000/;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # 登录限流
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://business-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
