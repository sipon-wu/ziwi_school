worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    server_tokens   off;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    # 限流
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    server {
        listen 80;

        # ── 安全响应头 ──
        add_header X-Content-Type-Options   "nosniff" always;
        add_header X-Frame-Options          "DENY" always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' ws: wss:" always;

        # ── 基础 WAF：拦截恶意请求 ──
        # SQL 注入
        set $sql_injection 0;
        if ($query_string ~* ".*(select%20|union%20|insert%20|drop%20|update%20|delete%20|exec%20|script).*") {
            set $sql_injection 1;
        }
        if ($request_uri ~* "(select|union|insert|drop|update|delete).*(%20|%27|')") {
            set $sql_injection 1;
        }
        # XSS
        set $xss_attack 0;
        if ($request_uri ~* "<script.*>|javascript:|onload=|onerror=") {
            set $xss_attack 1;
        }
        # 路径遍历
        if ($request_uri ~* "(\\.\\./|\\.\\.%2f|\\.\\.%5c)") {
            return 403;
        }
        if ($sql_injection = 1) { return 403; }
        if ($xss_attack = 1) { return 403; }

        # 前端静态资源
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 业务 API
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://business-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # AI 服务
        location /ai/ {
            proxy_pass http://ai-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 登录接口 - 严格控制速率
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://business-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 阻止敏感路径
        location ~* /\.(git|env|htaccess|DS_Store) { return 404; }
    }
}
